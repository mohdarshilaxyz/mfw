<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFW ESP - Elite Gaming Squad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #b967ff;
            --dark-bg: #0a0a1a;
            --darker-bg: #050510;
            --card-bg: rgba(10, 15, 30, 0.8);
            --text-glow: #a0e7ff;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 243, 255, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(185, 103, 255, 0.05) 0%, transparent 20%),
                linear-gradient(to bottom, rgba(5, 5, 16, 0.9), rgba(10, 10, 26, 0.9));
        }

        .neon-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }

        /* Glitter particles */
        .glitter {
            position: fixed;
            width: 4px;
            height: 4px;
            background-color: var(--neon-blue);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 8px var(--neon-blue), 0 0 12px var(--neon-blue);
            opacity: 0;
        }

        /* Header with animated MFW text */
        .header {
            text-align: center;
            padding: 40px 20px 60px;
            position: relative;
            margin-bottom: 40px;
        }

        .neon-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 5.5rem;
            font-weight: 900;
            color: transparent;
            background: linear-gradient(90deg, #00f3ff, #b967ff, #00f3ff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 20px;
            position: relative;
            animation: neonGlow 3s ease-in-out infinite, textShimmer 4s linear infinite;
            text-shadow: 
                0 0 10px rgba(0, 243, 255, 0.5),
                0 0 20px rgba(0, 243, 255, 0.3),
                0 0 30px rgba(0, 243, 255, 0.2);
        }

        @keyframes neonGlow {
            0%, 100% { 
                text-shadow: 
                    0 0 10px rgba(0, 243, 255, 0.8),
                    0 0 20px rgba(0, 243, 255, 0.6),
                    0 0 30px rgba(0, 243, 255, 0.4),
                    0 0 40px rgba(185, 103, 255, 0.2);
            }
            50% { 
                text-shadow: 
                    0 0 15px rgba(0, 243, 255, 0.9),
                    0 0 25px rgba(0, 243, 255, 0.7),
                    0 0 35px rgba(0, 243, 255, 0.5),
                    0 0 45px rgba(185, 103, 255, 0.3);
            }
        }

        @keyframes textShimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .subtitle {
            font-size: 1.5rem;
            color: var(--text-glow);
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
        }

        .subtitle::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
            bottom: -10px;
            left: 0;
        }

        .discord-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 243, 255, 0.1);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 30px;
            border: 2px solid var(--neon-blue);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .discord-link:hover {
            background: rgba(0, 243, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.5);
        }

        .discord-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.7s ease;
            z-index: -1;
        }

        .discord-link:hover::before {
            left: 100%;
        }

        .discord-icon {
            color: #7289da;
            font-size: 1.8rem;
            filter: drop-shadow(0 0 5px #7289da);
        }

        /* Team Section */
        .team-section {
            margin: 60px 0;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 50px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
        }

        .section-title::before, .section-title::after {
            content: '';
            position: absolute;
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
            top: 50%;
        }

        .section-title::before {
            right: calc(100% + 20px);
        }

        .section-title::after {
            left: calc(100% + 20px);
        }

        /* Team Grid */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }

        /* Member Card */
        .member-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0, 243, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
            backdrop-filter: blur(10px);
        }

        .member-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.1), rgba(185, 103, 255, 0.05));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .member-card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-blue);
            box-shadow: 
                0 10px 30px rgba(0, 243, 255, 0.2),
                inset 0 0 20px rgba(0, 243, 255, 0.1);
        }

        .member-card:hover::before {
            opacity: 1;
        }

        .member-card::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00f3ff, #b967ff, #00f3ff);
            border-radius: 17px;
            z-index: -2;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .member-card:hover::after {
            opacity: 1;
            animation: borderGlow 2s linear infinite;
        }

        @keyframes borderGlow {
            0%, 100% { 
                opacity: 0.7;
                filter: blur(5px);
            }
            50% { 
                opacity: 1;
                filter: blur(10px);
            }
        }

        .member-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--neon-blue);
            margin-bottom: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .member-role {
            font-size: 1.2rem;
            color: #b967ff;
            margin-bottom: 20px;
            font-weight: 600;
            padding: 8px 15px;
            background: rgba(185, 103, 255, 0.1);
            border-radius: 20px;
            display: inline-block;
            border: 1px solid rgba(185, 103, 255, 0.3);
        }

        .member-description {
            color: #a0e7ff;
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 1rem;
            font-weight: 300;
        }

        .role-icon {
            font-size: 1.3rem;
            color: var(--neon-blue);
            filter: drop-shadow(0 0 3px var(--neon-blue));
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 243, 255, 0.2);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            font-family: 'Orbitron', sans-serif;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #a0e7ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid rgba(0, 243, 255, 0.2);
            margin-top: 40px;
            position: relative;
        }

        .footer::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
            top: 0;
            left: 0;
        }

        .motto {
            font-size: 1.5rem;
            color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .copyright {
            color: #a0e7ff;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Background elements */
        .bg-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .neon-line {
            position: absolute;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
            opacity: 0.1;
        }

        .neon-circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0, 243, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.05);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .neon-title {
                font-size: 3.5rem;
                letter-spacing: 4px;
            }
            
            .team-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
            
            .section-title {
                font-size: 2rem;
            }
            
            .section-title::before, .section-title::after {
                width: 40px;
            }
        }

        @media (max-width: 480px) {
            .neon-title {
                font-size: 2.5rem;
                letter-spacing: 2px;
            }
            
            .team-grid {
                grid-template-columns: 1fr;
            }
            
            .member-name {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Glitter particles -->
    <div id="glitter-container"></div>
    
    <!-- Background elements -->
    <div class="bg-elements" id="bg-elements"></div>
    
    <div class="neon-container">
        <!-- Header -->
        <header class="header">
            <h1 class="neon-title">MFW ESP</h1>
            <p class="subtitle">ELITE GAMING SQUAD</p>
            
            <a href="https://discord.gg/wR83hJvYK" class="discord-link" target="_blank">
                <i class="fab fa-discord discord-icon"></i>
                JOIN OUR DISCORD
            </a>
        </header>
        
        <!-- Team Section -->
        <section class="team-section">
            <h2 class="section-title">THE SQUAD</h2>
            
            <div class="team-grid" id="team-container">
                <!-- Team members will be loaded by JavaScript -->
            </div>
        </section>
        
        <!-- Footer -->
        <footer class="footer">
            <p class="motto">"PRECISION • STRATEGY • DOMINATION"</p>
            <p class="copyright">MFW ESP © 2023 | ELITE GAMING SQUAD</p>
        </footer>
    </div>

    <script>
        // Team data
        const teamMembers = [
            {
                name: "MFW BILLA",
                role: "IGL + GUILD LEADER",
                description: "The strategic mastermind and leader of MFW ESP. Billa coordinates team movements, makes critical in-game decisions, and ensures squad synergy during high-pressure situations.",
                icon: "fa-crown",
                stats: { leadership: 10, strategy: 9, combat: 8 }
            },
            {
                name: "MFW ARSHIL",
                role: "PRIMARY RUSHER",
                description: "Aggressive entry fragger who leads assaults and breaks enemy defenses. Arshil's fast reflexes and decisive actions create openings for the team to secure objectives.",
                icon: "fa-bolt",
                stats: { aggression: 10, speed: 9, accuracy: 8 }
            },
            {
                name: "MFW VISHAL",
                role: "PRIMARY RUSHER",
                description: "Tactical rusher with exceptional game sense. Vishal complements Arshil's aggression with calculated flanks and surprise attacks that overwhelm opponents.",
                icon: "fa-bolt",
                stats: { tactics: 9, aggression: 9, awareness: 9 }
            },
            {
                name: "MFW SHADAB",
                role: "SNIPER / NADER / SUPPORTER",
                description: "Versatile player who adapts to team needs. Expert sniper for long-range eliminations, skilled with explosives for area denial, and reliable support for covering teammates.",
                icon: "fa-crosshairs",
                stats: { precision: 10, versatility: 9, support: 8 }
            },
            {
                name: "MFW SANKET",
                role: "SECONDARY RUSHER",
                description: "Flexible rusher who can pivot between aggressive pushing and tactical holds. Sanket provides crucial backup to primary rushers and secures captured positions.",
                icon: "fa-running",
                stats: { flexibility: 9, combat: 8, reaction: 9 }
            },
            {
                name: "MFW RAUF",
                role: "SECONDARY RUSHER",
                description: "Reliable secondary rusher with exceptional positioning skills. Rauf excels at holding angles and creating crossfire situations that trap enemy players.",
                icon: "fa-running",
                stats: { positioning: 10, consistency: 9, combat: 8 }
            },
            {
                name: "MFW MADDY",
                role: "SNIPER",
                description: "Designated marksman with unparalleled patience and precision. Maddy provides overwatch, gathers intel, and eliminates high-value targets from a distance.",
                icon: "fa-crosshairs",
                stats: { patience: 10, precision: 10, stealth: 9 }
            },
            {
                name: "MFW AYAN",
                role: "IMPACT",
                description: "Clutch player who delivers in critical moments. Ayan's unpredictable playstyle and ability to win unfavorable fights make him the X-factor of MFW ESP.",
                icon: "fa-star",
                stats: { clutch: 10, unpredictability: 9, impact: 10 }
            }
        ];

        // Create glitter particles
        function createGlitter() {
            const container = document.getElementById('glitter-container');
            const glitterCount = 50;
            
            for (let i = 0; i < glitterCount; i++) {
                const glitter = document.createElement('div');
                glitter.classList.add('glitter');
                
                // Random properties
                const size = Math.random() * 4 + 1;
                const posX = Math.random() * 100;
                const posY = Math.random() * 100;
                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 5;
                
                glitter.style.width = `${size}px`;
                glitter.style.height = `${size}px`;
                glitter.style.left = `${posX}vw`;
                glitter.style.top = `${posY}vh`;
                glitter.style.animation = `glitterAnimation ${duration}s ease-in-out ${delay}s infinite`;
                
                // Add custom animation
                const style = document.createElement('style');
                style.textContent = `
                    @keyframes glitterAnimation {
                        0%, 100% { opacity: 0; transform: translateY(0) scale(1); }
                        50% { opacity: 1; transform: translateY(-20px) scale(1.2); }
                    }
                `;
                document.head.appendChild(style);
                
                container.appendChild(glitter);
            }
        }

        // Create background elements
        function createBackgroundElements() {
            const container = document.getElementById('bg-elements');
            
            // Create lines
            for (let i = 0; i < 10; i++) {
                const line = document.createElement('div');
                line.classList.add('neon-line');
                
                const top = Math.random() * 100;
                const rotation = Math.random() * 360;
                const width = Math.random() * 100 + 50;
                
                line.style.top = `${top}%`;
                line.style.transform = `rotate(${rotation}deg)`;
                line.style.width = `${width}%`;
                
                container.appendChild(line);
            }
            
            // Create circles
            for (let i = 0; i < 15; i++) {
                const circle = document.createElement('div');
                circle.classList.add('neon-circle');
                
                const size = Math.random() * 300 + 50;
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                const opacity = Math.random() * 0.05 + 0.02;
                
                circle.style.width = `${size}px`;
                circle.style.height = `${size}px`;
                circle.style.left = `${left}%`;
                circle.style.top = `${top}%`;
                circle.style.opacity = opacity;
                
                container.appendChild(circle);
            }
        }

        // Render team members
        function renderTeamMembers() {
            const container = document.getElementById('team-container');
            
            teamMembers.forEach(member => {
                const card = document.createElement('div');
                card.classList.add('member-card');
                
                // Create stats HTML
                let statsHTML = '';
                for (const [key, value] of Object.entries(member.stats)) {
                    statsHTML += `
                        <div class="stat">
                            <div class="stat-value">${value}</div>
                            <div class="stat-label">${key}</div>
                        </div>
                    `;
                }
                
                card.innerHTML = `
                    <h3 class="member-name">
                        <i class="fas ${member.icon} role-icon"></i> ${member.name}
                    </h3>
                    <div class="member-role">${member.role}</div>
                    <p class="member-description">${member.description}</p>
                    <div class="stats">
                        ${statsHTML}
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            createGlitter();
            createBackgroundElements();
            renderTeamMembers();
            
            // Add hover effects to cards
            const cards = document.querySelectorAll('.member-card');
            cards.forEach(card => {
                card.addEventListener('mouseenter', function() {
                    this.style.transform = 'translateY(-15px) scale(1.03)';
                    this.style.boxShadow = '0 15px 40px rgba(0, 243, 255, 0.3), inset 0 0 30px rgba(0, 243, 255, 0.15)';
                });
                
                card.addEventListener('mouseleave', function() {
                    this.style.transform = 'translateY(-10px) scale(1)';
                    this.style.boxShadow = '0 10px 30px rgba(0, 243, 255, 0.2), inset 0 0 20px rgba(0, 243, 255, 0.1)';
                });
            });
            
            // Add ripple effect to Discord button
            const discordBtn = document.querySelector('.discord-link');
            discordBtn.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size/2;
                const y = e.clientY - rect.top - size/2;
                
                ripple.style.cssText = `
                    position: absolute;
                    border-radius: 50%;
                    background: rgba(255, 255, 255, 0.7);
                    transform: scale(0);
                    animation: ripple 0.6s linear;
                    width: ${size}px;
                    height: ${size}px;
                    top: ${y}px;
                    left: ${x}px;
                    pointer-events: none;
                `;
                
                this.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
            
            // Add ripple animation
            const style = document.createElement('style');
            style.textContent = `
                @keyframes ripple {
                    to {
                        transform: scale(4);
                        opacity: 0;
                    }
                }
            `;
            document.head.appendChild(style);
        });
    </script>
</body>
</html>
